name: CI — Windows

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Setup MSVC (for CGO)
        uses: ilammy/msvc-dev-cmd@v1

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Build
        run: go build -ldflags="-X bootimus/cmd.version=$(Get-Content VERSION)" -o dist/bootimus-windows-amd64.exe .

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./... -v -count=1

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: bootimus-windows-amd64
          path: dist/bootimus-windows-amd64.exe
