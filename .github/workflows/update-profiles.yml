name: Update Profiles

on:
  schedule:
    # Weekly check: Sunday at 06:00 UTC
    - cron: "0 6 * * 0"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  check-updates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run profile updater
        id: updater
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python .github/scripts/update-profiles.py --ci

      - name: Create Pull Request
        id: pr
        if: steps.updater.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: update tool and distro profiles to latest versions"
          title: "chore: auto-update tool and distro profiles"
          body: |
            Automated weekly check for newer versions of:

            **Tools:**
            - GParted Live, Clonezilla, Memtest86+, SystemRescue, ShredOS, Netboot.xyz

            **Distro releases:**
            - Ubuntu, Linux Mint, Debian, Fedora, Alpine Linux

            **Archive collections:**
            - Windows ISOs (Internet Archive: english_windows_collection)

            Generated by `.github/scripts/update-profiles.py`
          branch: auto-update-profiles
          base: main
          delete-branch: true

      - name: Enable auto-merge
        if: steps.pr.outputs.pull-request-number
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr merge --auto --merge "${{ steps.pr.outputs.pull-request-number }}"
